name: saluna

services:
  gateway:
    image: nginx:1.27-alpine
    container_name: saluna-gateway
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      pwa:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-saluna.ir}
      APP_DOMAIN: ${APP_DOMAIN:-app.saluna.ir}
      API_DOMAIN: ${API_DOMAIN:-api.saluna.ir}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - saluna

  api:
    image: ${SALUNA_API_IMAGE_REGISTRY:-${SALUNA_IMAGE_REGISTRY:-}}saluna-api:${SALUNA_API_IMAGE_TAG:-${SALUNA_IMAGE_TAG:-latest}}
    container_name: saluna-api
    restart: unless-stopped
    env_file:
      - ${SALUNA_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3002"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - saluna

  web:
    image: ${SALUNA_WEB_IMAGE_REGISTRY:-${SALUNA_IMAGE_REGISTRY:-}}saluna-web:${SALUNA_WEB_IMAGE_TAG:-${SALUNA_IMAGE_TAG:-latest}}
    container_name: saluna-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://saluna.ir}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.saluna.ir}
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - saluna

  pwa:
    image: ${SALUNA_PWA_IMAGE_REGISTRY:-${SALUNA_IMAGE_REGISTRY:-}}saluna-pwa:${SALUNA_PWA_IMAGE_TAG:-${SALUNA_IMAGE_TAG:-latest}}
    container_name: saluna-pwa
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - saluna

  postgres:
    image: postgres:16-alpine
    container_name: saluna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saluna}
      POSTGRES_USER: ${POSTGRES_USER:-saluna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - saluna

  registry:
    image: registry:2
    container_name: saluna-registry
    restart: unless-stopped
    profiles:
      - registry
    ports:
      - "127.0.0.1:${REGISTRY_PORT:-5000}:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - saluna

volumes:
  postgres_data:
  registry_data:

networks:
  saluna:
    driver: bridge
