<!doctype html>
<html dir="rtl" lang="fa">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>سالورا - شروع آفلاین</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8eff0;
        color: #6b3a4a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(189, 92, 110, 0.12), transparent 45%),
          #f8eff0;
      }
      .card {
        width: min(100%, 460px);
        border-radius: 24px;
        border: 1px solid rgba(107, 58, 74, 0.12);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 40px rgba(107, 58, 74, 0.1);
        padding: 24px;
        text-align: right;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        line-height: 1.85;
        color: rgba(107, 58, 74, 0.84);
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      a,
      button {
        appearance: none;
        border-radius: 14px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
        padding: 10px 14px;
      }
      .primary {
        border: 0;
        background: #6b3a4a;
        color: #fff;
      }
      .ghost {
        border: 1px solid rgba(107, 58, 74, 0.24);
        color: #6b3a4a;
        background: rgba(255, 255, 255, 0.7);
      }
      small {
        display: block;
        margin-top: 10px;
        color: rgba(107, 58, 74, 0.66);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>برنامه در حالت آفلاین اجرا شد</h1>
      <p>
        اتصال اینترنت قطع است. اگر قبلا صفحه‌هایی مثل تقویم یا مشتریان را باز کرده باشید،
        می‌توانید از مسیرهای زیر وارد شوید و آخرین داده ذخیره‌شده را ببینید.
      </p>
      <div class="actions">
        <a class="primary" href="/calendar">ورود به تقویم</a>
        <a class="ghost" href="/clients">لیست مشتریان</a>
        <button class="ghost" type="button" onclick="window.location.reload()">تلاش دوباره</button>
      </div>
      <small>پس از وصل شدن اینترنت، همگام‌سازی خودکار دوباره انجام می‌شود.</small>
    </main>
  </body>
</html>
