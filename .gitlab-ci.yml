stages:
  - build
  - deploy

variables:
  DOCKER_PLATFORM: linux/amd64
  SALUNA_NODE_IMAGE: hub.hamdocker.ir/library/node:22.12.0-alpine
  SALUNA_NGINX_IMAGE: hub.hamdocker.ir/library/nginx:1.27-alpine
  SALUNA_ALPINE_MIRROR: https://mirror.arvancloud.ir/alpine
  SALUNA_NPM_REGISTRY: https://repo.hmirror.ir/npm/
  SALUNA_PNPM_VERSION: 9.15.9

.kaniko-build:
  tags:
    - saluna-vps
  image:
    name: gcr.hamdocker.ir/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    - test -n "$SALUNA_IMAGE_REGISTRY"
    - test -n "$HAMDOCKER_USERNAME"
    - test -n "$HAMDOCKER_PASSWORD"
    - mkdir -p /kaniko/.docker
    - |
      auth="$(printf '%s:%s' "$HAMDOCKER_USERNAME" "$HAMDOCKER_PASSWORD" | base64 | tr -d '\n')"
      printf '{"auths":{"registry.hamdocker.ir":{"auth":"%s"}}}\n' "$auth" > /kaniko/.docker/config.json

.deploy:
  tags:
    - saluna-vps
  image: hub.hamdocker.ir/library/alpine:3.20
  before_script:
    - sed -i "s#https://dl-cdn.alpinelinux.org/alpine#${SALUNA_ALPINE_MIRROR}#g" /etc/apk/repositories
    - apk add --no-cache openssh-client
    - test -n "$VPS_HOST"
    - test -n "$VPS_SSH_USER"
    - test -n "$VPS_SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
    - ssh "$VPS_SSH_USER@$VPS_HOST" "mkdir -p /opt/saluna/scripts /opt/saluna/deploy/nginx/templates"
    - scp docker-compose.prod.yml "$VPS_SSH_USER@$VPS_HOST:/opt/saluna/docker-compose.prod.yml"
    - scp scripts/deploy-registry-app.sh "$VPS_SSH_USER@$VPS_HOST:/opt/saluna/scripts/deploy-registry-app.sh"
    - scp deploy/nginx/templates/saluna.conf.template "$VPS_SSH_USER@$VPS_HOST:/opt/saluna/deploy/nginx/templates/"
    - ssh "$VPS_SSH_USER@$VPS_HOST" "chmod +x /opt/saluna/scripts/deploy-registry-app.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never

build-api:
  extends: .kaniko-build
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/api/**/*
        - packages/brand/**/*
        - packages/auth/**/*
        - packages/database/**/*
        - packages/notifications/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
  script:
    - export SALUNA_API_VERSION="$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' apps/api/package.json | head -n 1)"
    - export SALUNA_API_IMAGE_TAG="${SALUNA_API_VERSION}-${CI_COMMIT_SHORT_SHA}"
    - export SALUNA_IMAGE_REGISTRY="${SALUNA_IMAGE_REGISTRY%/}/"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/apps/api/Dockerfile" \
        --destination "${SALUNA_IMAGE_REGISTRY}saluna-api:${SALUNA_API_IMAGE_TAG}" \
        --build-arg "NODE_IMAGE=${SALUNA_NODE_IMAGE}" \
        --build-arg "ALPINE_MIRROR=${SALUNA_ALPINE_MIRROR}" \
        --build-arg "NPM_REGISTRY=${SALUNA_NPM_REGISTRY}" \
        --build-arg "PNPM_VERSION=${SALUNA_PNPM_VERSION}" \
        --label "org.opencontainers.image.title=saluna-api" \
        --label "org.opencontainers.image.version=${SALUNA_API_VERSION}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}"
    - printf 'APP=api\nIMAGE_TAG=%s\nAPP_VERSION=%s\n' "$SALUNA_API_IMAGE_TAG" "$SALUNA_API_VERSION" > build.env
  artifacts:
    reports:
      dotenv: build.env

build-web:
  extends: .kaniko-build
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/web/**/*
        - packages/api-client/**/*
        - packages/brand/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
  script:
    - export SALUNA_WEB_VERSION="$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' apps/web/package.json | head -n 1)"
    - export SALUNA_WEB_IMAGE_TAG="${SALUNA_WEB_VERSION}-${CI_COMMIT_SHORT_SHA}"
    - export SALUNA_IMAGE_REGISTRY="${SALUNA_IMAGE_REGISTRY%/}/"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/apps/web/Dockerfile" \
        --destination "${SALUNA_IMAGE_REGISTRY}saluna-web:${SALUNA_WEB_IMAGE_TAG}" \
        --build-arg "NODE_IMAGE=${SALUNA_NODE_IMAGE}" \
        --build-arg "ALPINE_MIRROR=${SALUNA_ALPINE_MIRROR}" \
        --build-arg "NPM_REGISTRY=${SALUNA_NPM_REGISTRY}" \
        --build-arg "PNPM_VERSION=${SALUNA_PNPM_VERSION}" \
        --build-arg "PUBLIC_APP_URL=${PUBLIC_APP_URL:-https://saluna.ir}" \
        --build-arg "PUBLIC_API_URL=${PUBLIC_API_URL:-https://api.saluna.ir}" \
        --label "org.opencontainers.image.title=saluna-web" \
        --label "org.opencontainers.image.version=${SALUNA_WEB_VERSION}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}"
    - printf 'APP=web\nIMAGE_TAG=%s\nAPP_VERSION=%s\n' "$SALUNA_WEB_IMAGE_TAG" "$SALUNA_WEB_VERSION" > build.env
  artifacts:
    reports:
      dotenv: build.env

build-pwa:
  extends: .kaniko-build
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/pwa/**/*
        - packages/api-client/**/*
        - packages/database/**/*
        - packages/ui/**/*
        - packages/brand/**/*
        - packages/brand-tokens/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
  script:
    - export SALUNA_PWA_VERSION="$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' apps/pwa/package.json | head -n 1)"
    - export SALUNA_PWA_IMAGE_TAG="${SALUNA_PWA_VERSION}-${CI_COMMIT_SHORT_SHA}"
    - export SALUNA_IMAGE_REGISTRY="${SALUNA_IMAGE_REGISTRY%/}/"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/apps/pwa/Dockerfile" \
        --destination "${SALUNA_IMAGE_REGISTRY}saluna-pwa:${SALUNA_PWA_IMAGE_TAG}" \
        --build-arg "NODE_IMAGE=${SALUNA_NODE_IMAGE}" \
        --build-arg "NGINX_IMAGE=${SALUNA_NGINX_IMAGE}" \
        --build-arg "ALPINE_MIRROR=${SALUNA_ALPINE_MIRROR}" \
        --build-arg "NPM_REGISTRY=${SALUNA_NPM_REGISTRY}" \
        --build-arg "PNPM_VERSION=${SALUNA_PNPM_VERSION}" \
        --build-arg "VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://api.saluna.ir}" \
        --build-arg "VITE_APP_URL=${VITE_APP_URL:-https://app.saluna.ir}" \
        --build-arg "VITE_WEB_URL=${VITE_WEB_URL:-https://saluna.ir}" \
        --build-arg "VITE_PWA_ASSET_VERSION=${SALUNA_PWA_IMAGE_TAG}" \
        --label "org.opencontainers.image.title=saluna-pwa" \
        --label "org.opencontainers.image.version=${SALUNA_PWA_VERSION}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}"
    - printf 'APP=pwa\nIMAGE_TAG=%s\nAPP_VERSION=%s\n' "$SALUNA_PWA_IMAGE_TAG" "$SALUNA_PWA_VERSION" > build.env
  artifacts:
    reports:
      dotenv: build.env

deploy-api:
  extends: .deploy
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/api/**/*
        - packages/brand/**/*
        - packages/auth/**/*
        - packages/database/**/*
        - packages/notifications/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
      when: manual
    - when: never
  needs:
    - job: build-api
      artifacts: true
  script:
    - ssh "$VPS_SSH_USER@$VPS_HOST" "cd /opt/saluna && SALUNA_API_VERSION='$APP_VERSION' ./scripts/deploy-registry-app.sh api '$IMAGE_TAG'"

deploy-web:
  extends: .deploy
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/web/**/*
        - packages/api-client/**/*
        - packages/brand/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
      when: manual
    - when: never
  needs:
    - job: build-web
      artifacts: true
  script:
    - ssh "$VPS_SSH_USER@$VPS_HOST" "cd /opt/saluna && SALUNA_WEB_VERSION='$APP_VERSION' ./scripts/deploy-registry-app.sh web '$IMAGE_TAG'"

deploy-pwa:
  extends: .deploy
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps/pwa/**/*
        - packages/api-client/**/*
        - packages/database/**/*
        - packages/ui/**/*
        - packages/brand/**/*
        - packages/brand-tokens/**/*
        - packages/salon-core/**/*
        - package.json
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
        - docker-compose.prod.yml
        - scripts/build-push-registry-app.sh
        - scripts/deploy-registry-app.sh
      when: manual
    - when: never
  needs:
    - job: build-pwa
      artifacts: true
  script:
    - ssh "$VPS_SSH_USER@$VPS_HOST" "cd /opt/saluna && SALUNA_PWA_VERSION='$APP_VERSION' ./scripts/deploy-registry-app.sh pwa '$IMAGE_TAG'"
