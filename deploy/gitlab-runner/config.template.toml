concurrent = 1
check_interval = 15
shutdown_timeout = 30

[[runners]]
  name = "saluna-vps"
  url = "https://hamgit.ir"
  executor = "docker"
  limit = 1
  output_limit = 4096
  request_concurrency = 2
  [runners.docker]
    image = "hub.hamdocker.ir/library/alpine:3.20"
    helper_image = "hub.hamdocker.ir/gitlab/gitlab-runner-helper:x86_64-v19.0.1"
    privileged = false
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache"]
    shm_size = 0
    cpus = "1"
    memory = "1100m"
    memory_swap = "1100m"
    allowed_pull_policies = ["if-not-present", "always"]
    allowed_images = [
      "gcr.hamdocker.ir/kaniko-project/executor:*",
      "hub.hamdocker.ir/library/alpine:*"
    ]
    allowed_services = []
