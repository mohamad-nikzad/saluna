name: Database schema check

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-db-schema-sync.mjs'
      - 'packages/database/drizzle.config.ts'
      - 'packages/database/src/schema.ts'
      - 'packages/database/src/migrations/**'
      - '.github/workflows/main-db.yml'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-db-schema-sync.mjs'
      - 'packages/database/drizzle.config.ts'
      - 'packages/database/src/schema.ts'
      - 'packages/database/src/migrations/**'
      - '.github/workflows/main-db.yml'
  workflow_dispatch:

jobs:
  check-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:check
