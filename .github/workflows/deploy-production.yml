name: Deploy production

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web
          - pwa
      ref:
        description: Git ref whose images were built
        required: true
        default: main
        type: string
      skip_ci_check:
        description: Emergency only — allow deployment without a successful CI run
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Verify CI passed for this revision
        if: inputs.skip_ci_check != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="$(git rev-parse HEAD)"
          successful_runs="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f head_sha="$sha" \
            -f status=success \
            --jq '.total_count')"
          if [[ "$successful_runs" -lt 1 ]]; then
            echo "No successful CI run found for $sha" >&2
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          : "${VPS_HOST:?Set the VPS_HOST repository secret}"
          : "${VPS_SSH_PRIVATE_KEY:?Set the VPS_SSH_PRIVATE_KEY repository secret}"
          port="${VPS_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$port" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          : "${VPS_SSH_USER:?Set the VPS_SSH_USER repository secret}"
          port="${VPS_SSH_PORT:-22}"
          target="${VPS_SSH_USER}@${VPS_HOST}"
          ssh -p "$port" "$target" 'mkdir -p /opt/saluna/scripts /opt/saluna/deploy/nginx/templates'
          scp -P "$port" docker-compose.prod.yml "$target:/opt/saluna/docker-compose.prod.yml"
          scp -P "$port" scripts/deploy-registry-app.sh "$target:/opt/saluna/scripts/deploy-registry-app.sh"
          scp -P "$port" deploy/nginx/templates/saluna.conf.template "$target:/opt/saluna/deploy/nginx/templates/saluna.conf.template"
          ssh -p "$port" "$target" 'chmod +x /opt/saluna/scripts/deploy-registry-app.sh'

      - name: Deploy sequentially
        env:
          SELECTED_APP: ${{ inputs.app }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          set -Eeuo pipefail
          port="${VPS_SSH_PORT:-22}"
          target="${VPS_SSH_USER}@${VPS_HOST}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          registry="ghcr.io/${owner}/"
          short_sha="$(git rev-parse --short=7 HEAD)"

          if [[ "$SELECTED_APP" == "all" ]]; then
            apps=(api web pwa)
          else
            apps=("$SELECTED_APP")
          fi

          for app in "${apps[@]}"; do
            version="$(node -p "require('./apps/${app}/package.json').version")"
            tag="${version}-${short_sha}"
            image="${registry}saluna-${app}:${tag}"
            echo "Checking $image"
            docker manifest inspect "$image" >/dev/null
          done

          printf '%s' "$GHCR_TOKEN" | ssh -p "$port" "$target" \
            "docker login ghcr.io --username '$GHCR_USER' --password-stdin"
          cleanup() {
            ssh -p "$port" "$target" 'docker logout ghcr.io >/dev/null 2>&1 || true' || true
          }
          trap cleanup EXIT

          for app in "${apps[@]}"; do
            version="$(node -p "require('./apps/${app}/package.json').version")"
            tag="${version}-${short_sha}"
            case "$app" in
              api)
                registry_var=SALUNA_API_IMAGE_REGISTRY
                version_var=SALUNA_API_VERSION
                smoke_url=https://api.saluna.ir/health
                ;;
              web)
                registry_var=SALUNA_WEB_IMAGE_REGISTRY
                version_var=SALUNA_WEB_VERSION
                smoke_url=https://saluna.ir/
                ;;
              pwa)
                registry_var=SALUNA_PWA_IMAGE_REGISTRY
                version_var=SALUNA_PWA_VERSION
                smoke_url=https://app.saluna.ir/healthz
                ;;
            esac

            echo "Deploying ${app}:${tag}"
            ssh -p "$port" "$target" bash -s -- \
              "$app" "$tag" "$registry_var" "$version_var" "$version" "$registry" <<'REMOTE'
          set -Eeuo pipefail
          cd /opt/saluna
          export "$3=$6"
          export "$4=$5"
          ./scripts/deploy-registry-app.sh "$1" "$2"
          REMOTE

            curl --fail --show-error --silent \
              --retry 5 --retry-delay 2 --retry-all-errors \
              --output /dev/null "$smoke_url"
            echo "Deployed ${app}:${tag}" >> "$GITHUB_STEP_SUMMARY"
          done
