name: Deploy production

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to deploy
        required: true
        default: affected
        type: choice
        options:
          - affected
          - all
          - api
          - web
          - pwa
      ref:
        description: Image build ref, or latest successful production image build
        required: true
        default: latest
        type: string
      skip_ci_check:
        description: Emergency only — allow deployment without a successful CI run
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app }}
    runs-on: [self-hosted, Linux, X64, saluna-deploy]
    environment: production
    timeout-minutes: 30
    steps:
      - id: revision
        name: Resolve and download image build revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_REF: ${{ inputs.ref }}
        run: |
          set -Eeuo pipefail
          if [[ "$REQUESTED_REF" == "latest" ]]; then
            response="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/build-production-images.yml/runs?branch=main&status=success&per_page=1")"
            sha="$(printf '%s' "$response" | python3 -c \
              'import json, sys; runs=json.load(sys.stdin)["workflow_runs"]; print(runs[0]["head_sha"] if runs else "")')"
            if [[ -z "$sha" ]]; then
              echo "No successful production image build found on main." >&2
              exit 1
            fi
          else
            encoded_ref="$(python3 -c \
              'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' \
              "$REQUESTED_REF")"
            response="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${encoded_ref}")"
            sha="$(printf '%s' "$response" | python3 -c \
              'import json, sys; print(json.load(sys.stdin)["sha"])')"
          fi

          source_dir="${GITHUB_WORKSPACE}/source"
          archive="$(mktemp)"
          trap 'rm -f "$archive"' EXIT
          rm -rf "$source_dir"
          mkdir -p "$source_dir"
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${sha}" \
            --output "$archive"
          tar -xzf "$archive" --strip-components=1 -C "$source_dir"

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "source=$source_dir" >> "$GITHUB_OUTPUT"
          echo "Using image build revision ${sha}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify CI passed for this revision
        if: inputs.skip_ci_check != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SHA: ${{ steps.revision.outputs.sha }}
        run: |
          response="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${DEPLOY_SHA}&status=success&per_page=1")"
          successful_runs="$(printf '%s' "$response" | python3 -c \
            'import json, sys; print(json.load(sys.stdin)["total_count"])')"
          if [[ "$successful_runs" -lt 1 ]]; then
            echo "No successful CI run found for $DEPLOY_SHA" >&2
            exit 1
          fi

      - name: Install deployment files
        working-directory: ${{ steps.revision.outputs.source }}
        run: |
          install -m 755 -d /opt/saluna/scripts /opt/saluna/deploy/nginx/templates
          install -m 644 docker-compose.prod.yml /opt/saluna/docker-compose.prod.yml
          install -m 755 scripts/deploy-registry-app.sh /opt/saluna/scripts/deploy-registry-app.sh
          install -m 644 deploy/nginx/templates/saluna.conf.template \
            /opt/saluna/deploy/nginx/templates/saluna.conf.template

      - name: Deploy sequentially
        working-directory: ${{ steps.revision.outputs.source }}
        env:
          SELECTED_APP: ${{ inputs.app }}
          DEPLOY_SHA: ${{ steps.revision.outputs.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -Eeuo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          registry="ghcr.io/${owner}/"
          short_sha="${DEPLOY_SHA:0:7}"

          printf '%s' "$GHCR_TOKEN" | \
            docker login ghcr.io --username "$GHCR_USER" --password-stdin
          cleanup() {
            docker logout ghcr.io >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          version_for() {
            sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' \
              "apps/$1/package.json" | head -n 1
          }

          available_apps=()
          for app in api web pwa; do
            version="$(version_for "$app")"
            tag="${version}-${short_sha}"
            image="${registry}saluna-${app}:${tag}"
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              available_apps+=("$app")
            fi
          done

          if [[ "$SELECTED_APP" == "affected" ]]; then
            apps=("${available_apps[@]}")
          elif [[ "$SELECTED_APP" == "all" ]]; then
            apps=(api web pwa)
          else
            apps=("$SELECTED_APP")
          fi

          if [[ "${#apps[@]}" -eq 0 ]]; then
            echo "No production images exist for revision ${short_sha}." >&2
            exit 1
          fi

          for app in "${apps[@]}"; do
            if [[ ! " ${available_apps[*]} " =~ " ${app} " ]]; then
              echo "No image for ${app} at revision ${short_sha}." >&2
              exit 1
            fi
          done

          echo "Deploying apps: ${apps[*]}" | tee -a "$GITHUB_STEP_SUMMARY"

          for app in "${apps[@]}"; do
            version="$(version_for "$app")"
            tag="${version}-${short_sha}"
            case "$app" in
              api)
                registry_var=SALUNA_API_IMAGE_REGISTRY
                version_var=SALUNA_API_VERSION
                smoke_url=https://api.saluna.ir/health
                ;;
              web)
                registry_var=SALUNA_WEB_IMAGE_REGISTRY
                version_var=SALUNA_WEB_VERSION
                smoke_url=https://saluna.ir/
                ;;
              pwa)
                registry_var=SALUNA_PWA_IMAGE_REGISTRY
                version_var=SALUNA_PWA_VERSION
                smoke_url=https://app.saluna.ir/healthz
                ;;
            esac

            echo "Deploying ${app}:${tag}"
            (
              cd /opt/saluna
              export "$registry_var=$registry"
              export "$version_var=$version"
              ./scripts/deploy-registry-app.sh "$app" "$tag"
            )

            curl --fail --show-error --silent \
              --retry 5 --retry-delay 2 --retry-all-errors \
              --output /dev/null "$smoke_url"
            echo "Deployed ${app}:${tag}" >> "$GITHUB_STEP_SUMMARY"
          done
